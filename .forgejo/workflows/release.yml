on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: docker-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need entire history for git-cliff

      - name: Setup Zig
        uses: actions/setup-zig@v2
        with:
          version: 0.16.0

      - name: Setup Packages
        run: |
          apt update
          apt install -y \
            ca-certificates libluajit-5.1-dev libluajit-5.1-2 liblua5.1-0-dev libfuse3-dev libfuse3-4 \
            zip jq # jq needed for git-cliff

      - name: Build
        run: |
          zig build -Doptimize=ReleaseFast

      - name: Zip
        run: |
          mkdir release
          cd zig-out
          zip -r ../release/confgen-linux-x86_64.zip .

      - name: Create Changelog
        id: changelog
        uses: actions/git-cliff@v4
        with:
          config: ""
          args: --verbose --latest
          github_token: "${{ secrets.GH_TOKEN }}"
        env:
          OUTPUT: CHANGELOG.md

      - name: Upload
        uses: actions/forgejo-release@main
        with:
          direction: upload
          release-dir: release
          token: ${{ env.GITHUB_TOKEN }}
          release-notes-file: ${{ steps.changelog.outputs.changelog }}
